# Free local PostgreSQL — same as production Postgres, zero vendor lock-in
services:
  postgres:
    image: postgres:16-alpine
    container_name: vidyasetu-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vidyasetu
    volumes:
      - vidyasetu_pg_data:/var/lib/postgresql/data

volumes:
  vidyasetu_pg_data:
